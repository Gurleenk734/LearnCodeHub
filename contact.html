<!-- CONTENT -->
<div class="container">
  
  <!-- LEFT SIDE -->
  <div class="content">
    <h1>Contact Us</h1>

    <p>
      Have questions or feedback? We'd love to hear from you.
    </p>

    <p style="color: #94a3b8;">
      Email: 
      <a href="mailto:support@gmail.com" style="color:#ffffff; text-decoration: none;">
        support@gmail.com
      </a>
    </p>

    <ul style="list-style:none; display:flex; gap:10px;">
      <li><img src="github.png" width="30"></li>
      <li><img src="instagram.png" width="30"></li>
      <li><img src="linkedin.png" width="30"></li>
    </ul>
  </div>

  <!-- RIGHT SIDE FORM -->
  <div class="form">
    <h2>Send Feedback</h2>

    <form id="feedbackForm">

      <label>Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required />

      <label>Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <label>Subject:</label>
      <input type="text" id="subject" placeholder="Enter subject" required />

      <!-- NEW: Feedback Type -->
      <label>Feedback Type:</label>
      <select id="type" required>
        <option value="">Select</option>
        <option>Suggestion</option>
        <option>Bug Report</option>
        <option>General Feedback</option>
      </select>

      <!-- NEW: Rating -->
      <label>Rating:</label>
      <select id="rating" required>
        <option value="">Rate Us</option>
        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
        <option value="4">⭐⭐⭐⭐ Good</option>
        <option value="3">⭐⭐⭐ Average</option>
        <option value="2">⭐⭐ Poor</option>
        <option value="1">⭐ Bad</option>
      </select>

      <label>Message:</label>
      <textarea id="message" placeholder="Enter your feedback" required></textarea>

      <button type="submit">Submit Feedback</button>

      <p id="successMsg" style="color:#22d2ee;"></p>
    </form>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <div class="footercontent">
      <h2>LearnCode-Hub</h2>
      <p>Your Ultimate Coding Companion</p>
    </div>
  </div>

  <div class="copyright">
    <p>&copy; 2024 LearnCode-Hub. All rights reserved.</p>
  </div>
</footer>

<!-- SCRIPT -->
<script>
  document.getElementById("feedbackForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let feedback = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      subject: document.getElementById("subject").value,
      type: document.getElementById("type").value,
      rating: document.getElementById("rating").value,
      message: document.getElementById("message").value,
      date: new Date().toLocaleString()
    };

    let allFeedback = JSON.parse(localStorage.getItem("feedbackList")) || [];
    allFeedback.push(feedback);
    localStorage.setItem("feedbackList", JSON.stringify(allFeedback));

    // OPTIONAL: Add points to progress system
    let progress = JSON.parse(localStorage.getItem("learnProgress"));
    if (progress) {
      progress.points += 5;
      localStorage.setItem("learnProgress", JSON.stringify(progress));
    }

    document.getElementById("successMsg").innerText =
      "✅ Thank you! Feedback submitted successfully.";

    document.getElementById("feedbackForm").reset();
  });
</script>
